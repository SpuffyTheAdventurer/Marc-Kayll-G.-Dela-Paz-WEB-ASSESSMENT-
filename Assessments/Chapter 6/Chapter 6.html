<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Petrol Calculator</title>
    <link rel="stylesheet" href="Chapter 6.css">
</head>
<body>

    <!-- Main container -->
    <div class="container">
        <h1>Petrol Calculator</h1>

        <!-- Cost per litre input -->
        <label for="cost">Cost per litre (£):</label>
        <input type="number" id="cost" value="1.72" step="0.01">

        <!-- Litres input -->
        <label for="litres">Litres purchased:</label>
        <input type="number" id="litres" value="0" step="0.1">

        <!-- Calculate button -->
        <button onclick="calculateTotal()">Calculate Total</button>

        <!-- Result display -->
        <p id="result">Total: £0.00</p>
    </div>

    <script src="script.js"></script>
</body>
</html>
